name: 📂 Create Winner Folders on Merge

on:
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  create-winner-files:
    # CRITICAL: This ensures it only runs when you MERGE, not just close the PR
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # We check out 'main' because the code has just been merged there
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pandas

      - name: Generate Winner Files
        # This calls the finalize_content.py script we created earlier
        run: python .github/scripts/finalize_content.py

      - name: Create Pull Request for Winner Folders
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "🤖 Auto-setup content folders for winner titles"
          branch: automation/winner-folders
          title: "🤖 Auto-setup content folders for winner titles"
          body: "This PR was automatically generated to setup content folders based on the latest poll winners."
          base: main
          delete-branch: true
