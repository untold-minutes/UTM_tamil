name: 📂 Create Winner Folders on Merge

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  create-winner-files:
    # Trigger on push to main OR on PR merge to main
    if: |
      github.event_name == 'push' || 
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: check files
        run: |
          ls -la
          if [ -f "latest_winners.json" ]; then
            echo "✅ latest_winners.json found"
            cat latest_winners.json
          else
            echo "❌ latest_winners.json NOT found"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pandas

      - name: Generate Winner Files
        # This calls the finalize_content.py script we created earlier
        run: python .github/scripts/finalize_content.py

      - name: Create Pull Request for Winner Folders
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "🤖 Auto-setup content folders for winner titles"
          branch: automation/winner-folders
          title: "🤖 Auto-setup content folders for winner titles"
          body: "This PR was automatically generated to setup content folders based on the latest poll winners."
          base: main
          delete-branch: true
