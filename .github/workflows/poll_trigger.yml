name: Weekly Poll Automation

on:
  issue_comment:
    types: [created]

jobs:
  generate-poll:
    # Only runs if someone comments exactly "/poll" on a Pull Request
    if: github.event.comment.body == '/poll' && github.event.issue.pull_request
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      discussions: write
      pull-requests: write # Changed to write to allow posting comments
      issues: write        # Changed to write to allow posting comments

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        # Added the Google libraries here
        run: |
          pip install pandas google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Run Poll Script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: python .github/scripts/generate_poll.py

      - name: Post Links to Pull Request
        uses: peter-evans/create-or-update-comment@v4
        if: success() # Only posts if the script finished successfully
        with:
          issue-number: ${{ github.event.issue.number }}
          body-path: 'poll_summary.md'
