name: Weekly Poll Automation

on:
  issue_comment:
    types: [created]

jobs:
  generate-poll:
    # Changed to allow both Issues and Pull Requests
    if: github.event.comment.body == '/poll'
    runs-on: ubuntu-latest
    
    permissions:
      contents: write   # Need write to trigger actions
      discussions: write
      pull-requests: write
      issues: write
      actions: write    # CRITICAL: Needed to trigger the Tally workflow

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install pandas requests

      - name: Run Poll Script
        env:
          # MATCHING THE PYTHON SCRIPT NAMES:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          # Keeping these for your other logic
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: python .github/scripts/generate_poll.py

      - name: Post Links to Issue/PR
        uses: peter-evans/create-or-update-comment@v4
        if: success()
        with:
          token: ${{ secrets.PAT_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          body-path: 'poll_summary.md'
