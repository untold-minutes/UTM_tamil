name: 📊 Auto-Tally Poll Winners
on:
  repository_dispatch:
    types: [poll_started]

jobs:
  wait_and_tally:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Wait for 24 Hours
        # 86400 seconds = 24 hours
        run: sleep 120

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install google-auth google-api-python-client requests

      - name: Fetch Winners
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_CREDENTIALS }}
          # These come from the payload sent by your poll script
          FORM_ID: ${{ github.event.client_payload.form_id }}
          POLL_TYPE: ${{ github.event.client_payload.poll_type }}
        run: python .github/scripts/fetch_winners.py

      - name: Post Winners to GitHub
        uses: peter-evans/create-or-update-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.client_payload.issue_number }}
          body-path: winner_summary.md
