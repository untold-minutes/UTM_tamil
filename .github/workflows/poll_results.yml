name: 📊 Auto-Tally Poll Winners
on:
  repository_dispatch:
    types: [poll_started]

jobs:
  wait_and_tally:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write # Needed to push the JSON file
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ secrets.PAT_TOKEN }} # Use PAT to allow triggering other actions

      - name: Wait for Poll Results
        run: sleep 30

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install google-auth google-api-python-client requests

      - name: Fetch Winners
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_CREDENTIALS }}
          FORM_ID: ${{ github.event.client_payload.form_id }}
          POLL_TYPE: ${{ github.event.client_payload.poll_type }}
          ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: python .github/scripts/fetch_winners.py
        
      - name: check file
        run: ls -la

      - name: Post Winners to GitHub
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          issue-number: ${{ github.event.client_payload.issue_number }}
          body-path: winner_summary.md

      - name: Save Winner Data to Repo
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_CREDENTIALS }}
          FORM_ID: ${{ github.event.client_payload.form_id }}
          POLL_TYPE: ${{ github.event.client_payload.poll_type }}
          ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Retry loop to handle parallel pushes
          for i in {1..5}; do
            echo "Attempt $i to push latest_winners.json..."
            
            git fetch origin develop
            git checkout develop
            git reset --hard origin/develop
            
            # Re-run the fetch winners script to merge with potentially new remote data
            python .github/scripts/fetch_winners.py
            
            git add latest_winners.json
            
            # Only commit if there are changes
            if git diff --staged --quiet; then
              echo "No changes to commit."
              exit 0
            fi
            
            git commit -m "🤖 Update latest winners JSON [skip ci]"
            
            if git push origin develop; then
              echo "✅ Successfully pushed winners."
              exit 0
            else
              echo "❌ Push failed. Retrying in 5 seconds..."
              sleep 5
            fi
          done
          echo "❌ Failed to push after 5 attempts."
          exit 1
